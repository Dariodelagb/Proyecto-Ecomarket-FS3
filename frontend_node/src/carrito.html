<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Carrito | EcoMarket</title>
  </head>
  <body class="home-page cart-page">
    <header class="home-nav">
      <a href="index.html#home" class="home-brand">EcoMarket</a>
      <nav class="home-menu" aria-label="Navegacion principal">
        <a href="index.html#home">Home</a>
        <a href="index.html#equipo">Equipo</a>
        <a href="productos.html">Productos</a>
        <a href="index.html#mapa">Mapa</a>
        <a href="index.html#formulario">Formulario</a>
      </nav>
      <div class="home-auth-actions">
        <a class="home-auth-link auth-guest-only" href="registro.html">Registrarse</a>
        <a class="home-auth-link auth-guest-only" href="login.html">Iniciar sesion</a>
        <button class="home-auth-link auth-session-only" type="button" data-logout>Cerrar sesion</button>
      </div>
      <a class="home-cart-link" href="carrito.html" aria-label="Ver carrito">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 18.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Zm10 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3ZM4.8 5l.5 2h14.4l-1.9 7.2H7.1L4.9 3.8H2.5V2h3.8l.7 3Z" />
        </svg>
        <span id="cart-count">0</span>
      </a>
    </header>

    <main>
      <section class="products-hero cart-hero">
        <div>
          <p class="home-kicker">Carrito</p>
          <h1>Tu carrito EcoMarket</h1>
          <p>
            Revisa los productos seleccionados antes de continuar con la compra.
          </p>
        </div>
        <a href="productos.html" class="home-button home-button--secondary">Seguir comprando</a>
      </section>

      <section class="home-section cart-section">
        <div class="cart-layout">
          <div>
            <div class="products-toolbar cart-toolbar">
              <div>
                <p>Cliente activo</p>
                <h2 id="cart-client-name">Cargando carrito</h2>
              </div>
            </div>
            <div id="cart-items" class="cart-items"></div>
          </div>

          <aside class="cart-summary">
            <p>Resumen</p>
            <h2 id="cart-total">$0</h2>
            <span id="cart-summary-count">0 productos</span>
            <a href="index.html#formulario" class="home-button home-button--primary">Finalizar por contacto</a>
          </aside>
        </div>
      </section>
    </main>

    <footer class="home-footer">
      <p>EcoMarket</p>
      <span id="year"></span>
    </footer>
  </body>
</html>
