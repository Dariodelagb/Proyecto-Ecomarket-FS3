<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dashboard | EcoMarket</title>
  </head>
  <body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': true, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = localStorage.getItem('darkMode') === null ? true : JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="mx-auto w-full max-w-full p-4 md:p-6">
            <div x-data="{ pageName: `Dashboard`}">
              <include src="./partials/breadcrumb.html" />
            </div>

            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <div class="col-span-12 space-y-6">
                <include src="./partials/metric-group/metric-group-01.html" />
                <include src="./partials/chart/chart-01.html" />
              </div>

              <div class="col-span-12">
                <include src="./partials/product/product-form.html" />
              </div>

              <div class="col-span-12">
                <include src="./partials/table/table-01.html" />
              </div>

              <div class="col-span-12">
                <include src="./partials/table/table-users.html" />
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
