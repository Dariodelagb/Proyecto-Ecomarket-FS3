<section
  class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6"
>
  <div class="mb-5 flex flex-col gap-1">
    <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
      Agregar producto
    </h3>
    <p class="text-theme-sm text-gray-500 dark:text-gray-400">
      Registra un nuevo producto y su stock inicial en la base de datos.
    </p>
  </div>

  <form id="admin-product-form" class="grid grid-cols-1 gap-4 lg:grid-cols-12">
    <div class="lg:col-span-4">
      <label
        for="admin-product-name"
        class="mb-1.5 block text-theme-sm font-medium text-gray-700 dark:text-gray-400"
      >
        Nombre
      </label>
      <input
        id="admin-product-name"
        name="nombre"
        type="text"
        maxlength="120"
        required
        placeholder="Ej: Bloqueador solar natural"
        class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-theme-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
      />
    </div>

    <div class="lg:col-span-2">
      <label
        for="admin-product-price"
        class="mb-1.5 block text-theme-sm font-medium text-gray-700 dark:text-gray-400"
      >
        Precio
      </label>
      <input
        id="admin-product-price"
        name="precio"
        type="number"
        min="1"
        max="99999999"
        step="1"
        required
        placeholder="12990"
        class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-theme-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
      />
    </div>

    <div class="lg:col-span-2">
      <label
        for="admin-product-stock"
        class="mb-1.5 block text-theme-sm font-medium text-gray-700 dark:text-gray-400"
      >
        Stock
      </label>
      <input
        id="admin-product-stock"
        name="stock"
        type="number"
        min="0"
        max="999999"
        step="1"
        required
        placeholder="25"
        class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-theme-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
      />
    </div>

    <div class="lg:col-span-3">
      <label
        for="admin-product-category"
        class="mb-1.5 block text-theme-sm font-medium text-gray-700 dark:text-gray-400"
      >
        Categoria
      </label>
      <select
        id="admin-product-category"
        name="categoria"
        required
        class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-theme-sm text-gray-800 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
      >
        <option value="">Cargando categorias...</option>
      </select>
    </div>

    <div class="flex items-end lg:col-span-1">
      <button
        id="admin-product-submit"
        type="submit"
        class="bg-brand-500 hover:bg-brand-600 inline-flex h-11 w-full items-center justify-center rounded-lg px-4 py-2.5 text-theme-sm font-medium text-white shadow-theme-xs disabled:cursor-not-allowed disabled:opacity-60"
      >
        Guardar
      </button>
    </div>

    <p
      id="admin-product-message"
      class="hidden rounded-lg px-3 py-2 text-theme-sm lg:col-span-12"
      role="status"
      aria-live="polite"
    ></p>
  </form>
</section>
