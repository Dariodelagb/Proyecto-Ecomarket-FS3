<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Productos Disponibles</h1>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Categoría</th> </tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${listaProductos}">
                <td th:text="${prod.id}">ID</td>
                <td th:text="${prod.nombre}">Nombre</td>
                <td th:text="${prod.precio}">Precio</td>
                <td th:text="${prod.categoria != null ? prod.categoria.categoria : 'Sin categoría'}">Categoría</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
