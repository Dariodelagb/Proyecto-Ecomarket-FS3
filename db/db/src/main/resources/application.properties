spring.application.name=db

spring.datasource.url=jdbc:mysql://localhost:3306/sistema_ventas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Esperar hasta 90 segundos a que la DB responda al arrancar
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
# Intentar reconectar si la DB se cae al inicio
spring.datasource.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=update