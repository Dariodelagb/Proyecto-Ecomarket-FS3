services:
  mysql:
    image: mysql:8.0
    container_name: ecomarket_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_ventas
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - ecomarket_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s

  db:
    build: ./db/db
    container_name: ecomarket_db
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/sistema_ventas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - ecomarket_network

  frontend:
    profiles:
      - old-frontend
    build: ./frontend/frontend
    container_name: ecomarket_frontend
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecomarket_network

  sistemareportes:
    build: ./sistemareportes
    container_name: ecomarket_sistemareportes
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecomarket_network

  frontend_node:
    build: ./frontend_node
    container_name: ecomarket_frontend_node
    restart: on-failure
    ports:
      - "8083:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecomarket_network

volumes:
  mysql_data:

networks:
  ecomarket_network:
    driver: bridge
